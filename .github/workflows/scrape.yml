name: Scrape Events

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Scraper source to run, for example: all, luma, eventbrite, meetup"
        required: false
        default: "all"

      target_urls:
        description: "Comma-separated listing/calendar URLs"
        required: false
        default: "https://luma.com/nyc"

      max_events:
        description: "Optional event limit after discovery and sharding"
        required: false
        default: ""

      shard_index:
        description: "Zero-based shard index"
        required: false
        default: "0"

      shard_count:
        description: "Total number of shards"
        required: false
        default: "1"

      scroll_rounds:
        description: "Maximum listing-page scroll rounds"
        required: false
        default: "40"

      sheet_write_mode:
        description: "replace for one full run; append when running separate shards"
        required: false
        type: choice
        options:
          - replace
          - append
        default: replace

  schedule:
    - cron: "0 8 * * *"

jobs:
  scrape:
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 600

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run scraper
        env:
          SCRAPER_SOURCE: ${{ inputs.source || vars.SCRAPER_SOURCE || 'all' }}
          TARGET_URLS: ${{ inputs.target_urls || vars.TARGET_URLS || 'https://luma.com/nyc' }}
          LUMA_TARGET_URLS: ${{ inputs.target_urls || vars.LUMA_TARGET_URLS || 'https://luma.com/nyc' }}
          REQUEST_DELAY_SECONDS: ${{ vars.REQUEST_DELAY_SECONDS || '2.0' }}
          MAX_EVENTS_PER_SOURCE: ${{ inputs.max_events || vars.MAX_EVENTS_PER_SOURCE }}
          SCROLL_ROUNDS: ${{ inputs.scroll_rounds || vars.SCROLL_ROUNDS || '40' }}
          NO_NEW_URL_ROUNDS: ${{ vars.NO_NEW_URL_ROUNDS || '5' }}
          SHEET_WRITE_MODE: ${{ inputs.sheet_write_mode || vars.SHEET_WRITE_MODE || 'replace' }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
        run: |
          . .venv/bin/activate
          python main.py \
            --source "${SCRAPER_SOURCE}" \
            --shard-index "${{ inputs.shard_index || '0' }}" \
            --shard-count "${{ inputs.shard_count || '1' }}"

      - name: Upload exports
        uses: actions/upload-artifact@v4
        with:
          name: event-exports-${{ inputs.source || 'scheduled' }}-shard-${{ inputs.shard_index || '0' }}
          path: exports/
          if-no-files-found: warn
